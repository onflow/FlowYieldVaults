name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in the ${{ github.repository }} repository.

            Steps:
            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to get the changes.
            2. Run `gh pr view ${{ github.event.pull_request.number }}` for PR description and context.
            3. Read any relevant files from the repo as needed to understand context.
            4. Post your findings using `gh pr review ${{ github.event.pull_request.number }} --comment -b "..."`.

            Focus only on concrete, actionable issues:
            - correctness and bugs
            - security vulnerabilities
            - breaking changes
            - performance regressions
            - readability and maintainability

            Use the repository's CLAUDE.md for style and conventions.
            Skip nitpicks. Only comment if there is a real issue worth fixing.

